# Site quality gate — runs when this template lives in its own repo (client
# clone pushed standalone, or an exported site). Inside the studio monorepo
# the same gate runs from the root CI workflow instead (nested .github
# directories are inert there).
name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      # Builds against the generated CI content fixture (snapshot mode — no
      # live CMS needed), then Lighthouse + internal link check.
      - run: pnpm quality
